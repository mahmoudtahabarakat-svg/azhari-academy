<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>أكاديمية المعلم الأزهري | المنصة المتكاملة</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@400;600;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root{--green:#1B5E3B;--green-dark:#0F3D26;--gold:#C9A84C;--gold-light:#E2C47A;--cream:#FAF7F0;--white:#fff;--charcoal:#1A1A2E;}
*{margin:0;padding:0;box-sizing:border-box; scroll-behavior: smooth;}
body{font-family:'Tajawal',sans-serif;background:var(--cream);color:var(--charcoal);line-height:1.6;}

/* Navigation */
nav{position:fixed;top:0;width:100%;z-index:1000;background:var(--green-dark);height:65px;display:flex;align-items:center;justify-content:center;border-bottom:2px solid var(--gold);}
.nav-logo{font-family:'Amiri',serif;color:var(--gold);font-size:1.3rem;font-weight:700;text-decoration:none;}

.container{max-width:800px;margin:80px auto 40px;padding:0 15px;}

/* Cards */
.card{background:var(--white);border-radius:20px;padding:20px;margin-bottom:20px;box-shadow:0 4px 15px rgba(0,0,0,0.05);border-right:5px solid var(--gold);}
.card-title{font-family:'Amiri',serif;font-size:1.5rem;color:var(--green);margin-bottom:15px;display:flex;align-items:center;gap:10px;}

/* 1. أذكار بعداد */
.azkar-item{background:var(--cream);padding:15px;border-radius:15px;margin-bottom:10px;text-align:center;cursor:pointer;transition:0.3s;}
.azkar-item:active{transform:scale(0.98);}
.azkar-text{font-family:'Amiri',serif;font-size:1.2rem;margin-bottom:10px;display:block;}
.azkar-count{background:var(--green);color:white;padding:5px 15px;border-radius:50px;font-size:0.9rem;}

/* 2. نموذج الواتساب */
.form-group{margin-bottom:15px;}
label{display:block;margin-bottom:5px;font-weight:600;font-size:0.9rem;}
input, select{width:100%;padding:12px;border:1px solid #ddd;border-radius:10px;font-family:'Tajawal';}
.btn-whatsapp{width:100%;background:#25D366;color:white;border:none;padding:15px;border-radius:10px;font-weight:700;cursor:pointer;font-size:1rem;}

/* 3. الاختبار السريع */
.quiz-box{text-align:center;padding:10px;}
#quiz-question{font-weight:700;margin-bottom:15px;display:block;}
.quiz-options{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.opt-btn{background:var(--white);border:2px solid var(--green);padding:10px;border-radius:10px;cursor:pointer;transition:0.3s;}
.opt-btn:hover{background:var(--green);color:white;}

/* 4. اليوتيوب */
.video-container{position:relative;padding-bottom:56.25%;height:0;overflow:hidden;border-radius:15px;}
.video-container iframe{position:absolute;top:0;left:0;width:100%;height:100%;}

/* Tabs */
.tabs{display:flex;gap:5px;overflow-x:auto;padding-bottom:10px;margin-bottom:15px;}
.tab-btn{background:var(--white);border:none;padding:10px 15px;border-radius:50px;white-space:nowrap;font-weight:600;cursor:pointer;box-shadow:0 2px 5px rgba(0,0,0,0.05);}
.tab-btn.active{background:var(--green);color:white;}

.hidden {display: none;}
</style>
</head>
<body>

<nav><a href="#" class="nav-logo">🕌 أكاديمية المعلم الأزهري</a></nav>

<div class="container">
    
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('main', this)">🏠 الرئيسية</button>
        <button class="tab-btn" onclick="switchTab('azkar', this)">📿 الأذكار</button>
        <button class="tab-btn" onclick="switchTab('quiz', this)">🧠 اختبر طفلك</button>
        <button class="tab-btn" onclick="switchTab('register', this)">📝 سجل الآن</button>
    </div>

    <div id="section-main">
        <div class="card">
            <div class="card-title"><i class="fas fa-video"></i> حصة تجريبية</div>
            <div class="video-container">
                <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ" frameborder="0" allowfullscreen></iframe>
            </div>
        </div>

        <div class="card">
            <div class="card-title"><i class="fas fa-mosque"></i> مواقيت الصلاة</div>
            <div id="prayer-times" style="display:grid; grid-template-columns:repeat(3,1fr); gap:10px; text-align:center;">
                <div style="background:var(--cream); padding:10px; border-radius:10px;">الفجر<br><b id="fajr">--:--</b></div>
                <div style="background:var(--cream); padding:10px; border-radius:10px;">الظهر<br><b id="dhuhr">--:--</b></div>
                <div style="background:var(--cream); padding:10px; border-radius:10px;">العصر<br><b id="asr">--:--</b></div>
                <div style="background:var(--cream); padding:10px; border-radius:10px;">المغرب<br><b id="maghrib">--:--</b></div>
                <div style="background:var(--cream); padding:10px; border-radius:10px;">العشاء<br><b id="isha">--:--</b></div>
            </div>
        </div>
    </div>

    <div id="section-azkar" class="hidden">
        <div class="card">
            <div class="card-title"><i class="fas fa-heart"></i> أذكار المسلم</div>
            <div class="azkar-item" onclick="handleZekr(this, 33)">
                <span class="azkar-text">سُبْحَانَ اللَّهِ</span>
                <span class="azkar-count">العدد المتبقي: <span>33</span></span>
            </div>
            <div class="azkar-item" onclick="handleZekr(this, 33)">
                <span class="azkar-text">الْحَمْدُ لِلَّهِ</span>
                <span class="azkar-count">العدد المتبقي: <span>33</span></span>
            </div>
            <div class="azkar-item" onclick="handleZekr(this, 33)">
                <span class="azkar-text">اللَّهُ أَكْبَرُ</span>
                <span class="azkar-count">العدد المتبقي: <span>33</span></span>
            </div>
        </div>
    </div>

    <div id="section-quiz" class="hidden">
        <div class="card">
            <div class="card-title"><i class="fas fa-lightbulb"></i> سؤال وجواب</div>
            <div class="quiz-box">
                <span id="quiz-question">من هو خاتم الأنبياء والمرسلين؟</span>
                <div class="quiz-options">
                    <button class="opt-btn" onclick="checkQuiz(true)">سيدنا محمد ﷺ</button>
                    <button class="opt-btn" onclick="checkQuiz(false)">سيدنا عيسى عليه السلام</button>
                </div>
            </div>
        </div>
    </div>

    <div id="section-register" class="hidden">
        <div class="card">
            <div class="card-title"><i class="fas fa-edit"></i> نموذج تسجيل طالب</div>
            <div class="form-group">
                <label>اسم الطفل</label>
                <input type="text" id="student_name" placeholder="مثلاً: أحمد محمود">
            </div>
            <div class="form-group">
                <label>عمر الطفل</label>
                <input type="number" id="student_age" placeholder="مثلاً: 7">
            </div>
            <div class="form-group">
                <label>المادة المطلوبة</label>
                <select id="subject">
                    <option>حفظ القرآن الكريم</option>
                    <option>تعلم اللغة العربية</option>
                    <option>السيرة والآداب</option>
                    <option>القاعدة النورانية</option>
                </select>
            </div>
            <button class="btn-whatsapp" onclick="sendToWhatsapp()"><i class="fab fa-whatsapp"></i> إرسال البيانات للمعلم</button>
        </div>
    </div>

</div>

<script>
// تبديل الأقسام
function switchTab(id, btn) {
    const sections = ['main', 'azkar', 'quiz', 'register'];
    sections.forEach(s => document.getElementById('section-' + s).classList.add('hidden'));
    document.getElementById('section-' + id).classList.remove('hidden');
    
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
}

// نظام الأذكار
function handleZekr(el, initialCount) {
    let span = el.querySelector('.azkar-count span');
    let count = parseInt(span.innerText);
    if (count > 1) {
        count--;
        span.innerText = count;
    } else {
        el.style.background = "#d4edda";
        span.innerText = "تمت القراءة ✅";
    }
    if(navigator.vibrate) navigator.vibrate(30);
}

// إرسال للواتساب
function sendToWhatsapp() {
    let name = document.getElementById('student_name').value;
    let age = document.getElementById('student_age').value;
    let subject = document.getElementById('subject').value;
    
    if(!name || !age) { alert("يرجى ملء البيانات"); return; }
    
    let message = `السلام عليكم، أرغب في تسجيل طفلي:\nالاسم: ${name}\nالعمر: ${age}\nالمادة: ${subject}`;
    let url = `https://wa.me/201234567890?text=${encodeURIComponent(message)}`; // ضع رقمك هنا
    window.open(url, '_blank');
}

// الاختبار السريع
function checkQuiz(correct) {
    if(correct) {
        alert("إجابة صحيحة! بارك الله فيك يا بطل 🌟");
    } else {
        alert("حاول مرة أخرى، أنت تستطيع! 😊");
    }
}

// جلب المواقيت (القاهرة كافتراضي)
async function getPrayers() {
    const res = await fetch('https://api.aladhan.com/v1/timingsByCity?city=Cairo&country=Egypt&method=5');
    const data = await res.json();
    const t = data.data.timings;
    document.getElementById('fajr').innerText = t.Fajr;
    document.getElementById('dhuhr').innerText = t.Dhuhr;
    document.getElementById('asr').innerText = t.Asr;
    document.getElementById('maghrib').innerText = t.Maghrib;
    document.getElementById('isha').innerText = t.Isha;
}

getPrayers();
</script>
</body>
</html>
