<script>
const STORIES = [
  // ─── الأنبياء ───
  {
    id: 1, cat: 'prophets', icon: '🌊', color: '#E3F2FD',
    title: 'سيدنا آدم عليه السلام',
    summary: 'أبو البشر وأول الأنبياء — قصة الخلق والجنة والهبوط إلى الأرض',
    time: '١٥ دقيقة',
    content: `
      <div class="reader-header" style="background:linear-gradient(135deg,#1a237e,#283593);">
        <div class="reader-icon">🌍</div>
        <h1>سيدنا آدم عليه السلام</h1>
        <p>أبو البشر وأول الأنبياء والمرسلين</p>
      </div>
      <div class="reader-body">
        <h2>البداية — خلق آدم</h2>
        <p>قبل أن يُخلق آدم عليه السلام، أخبر الله الملائكةَ بما سيكون. قال تعالى: ﴿وَإِذْ قَالَ رَبُّكَ لِلْمَلَائِكَةِ إِنِّي جَاعِلٌ فِي الْأَرْضِ خَلِيفَةً﴾. فتعجّبت الملائكة، وقالت: أتجعل فيها من يُفسد فيها ويسفك الدماء؟ فأجابها الله: ﴿إِنِّي أَعْلَمُ مَا لَا تَعْلَمُونَ﴾.</p>
        <p>خلق الله آدم من طين الأرض، ونفخ فيه من روحه، فصار إنساناً سويّاً. وعلّمه أسماء كل شيء، فكانت أول هبة من الله لهذا المخلوق الجديد — العقل والمعرفة واللغة.</p>
        <p>ثم أمر الله الملائكة أن يسجدوا لآدم تكريماً وإجلالاً، فسجدوا جميعاً إلا إبليس، الذي أبى واستكبر، وقال: ﴿أَنَا خَيْرٌ مِّنْهُ خَلَقْتَنِي مِن نَّارٍ وَخَلَقْتَهُ مِن طِينٍ﴾. فكان هذا أول كِبر في الوجود، وأول معصية.</p>

        <h2>في الجنة مع حواء</h2>
        <p>أسكن الله آدم وزوجه حواء الجنة، وأباح لهما كل شيء فيها، إلا شجرة واحدة نهاهما عن الاقتراب منها. وكانت الجنة نعيماً لا حدّ له — لا جوع ولا عطش ولا تعب ولا حزن.</p>
        <p>لكن إبليس، الذي طُرد من رحمة الله، أقسم أن يُغوي البشر. فجاء لآدم وحواء يُزيّن لهما العصيان، ويوسوس في آذانهما، ويقول إن الله نهاهما عن تلك الشجرة لأنها ستجعلهما ملَكَين أو تجعلهما خالدَين.</p>
        <p>ضعُف آدم وحواء أمام الوسوسة، فأكلا من الشجرة. وفي اللحظة التي أكلا فيها، بدت لهما عوراتهما، وأحسّا بشيء لم يُحسّا به من قبل — الخجل والندم.</p>

        <h2>التوبة والهبوط</h2>
        <p>نادى الله آدم وحواء، فخجلا وندما. ولم يتعللا بأعذار، بل قالا من أعماق قلبيهما: ﴿رَبَّنَا ظَلَمْنَا أَنفُسَنَا وَإِن لَّمْ تَغْفِرْ لَنَا وَتَرْحَمْنَا لَنَكُونَنَّ مِنَ الْخَاسِرِينَ﴾. فتاب الله عليهما — وهذا درس عظيم: الاعتراف بالخطأ والتوبة الصادقة مقبولة دائماً.</p>
        <p>هبط آدم وحواء إلى الأرض، ليبدآ حياة جديدة. لم تكن هذه عقوبة فحسب، بل كانت مهمة — فآدم خُلق أصلاً ليكون خليفة في الأرض كما أخبر الله الملائكة.</p>
        <p>ظلّ آدم على الأرض يعبد الله ويعلّم أبناءه، ومكث فيها تسعمئة وستاً وثلاثين سنة. وكان نبياً مُكرَّماً، يُوحى إليه ويتواصل مع ربه. وتعلّم الحراثة والزراعة والبناء، وعاش حياةً كريمة بعيداً عن الراحة السهلة لكن قريباً من الله دائماً.</p>

        <div class="highlight">قال رسول الله ﷺ: "إن الله خلق آدم على صورته، طوله ستون ذراعاً..." — صحيح البخاري</div>

        <h2>قابيل وهابيل — أول مأساة</h2>
        <p>من أعظم ما مرّ بآدم في حياته حادثة ابنيه. كان لآدم ولدان: هابيل الطيب القلب، وقابيل الذي أكل الغيرة قلبَه. قدّم كلاهما قرباناً لله، فقُبل قربان هابيل ولم يُقبل قربان قابيل. فبدلاً من أن يُراجع قابيل نفسه ويتوب، أعلنها تهديداً: ﴿لَأَقْتُلَنَّكَ﴾.</p>
        <p>قال له هابيل بهدوء وإيمان: ﴿إِنِّي أُرِيدُ أَن تَبُوءَ بِإِثْمِي وَإِثْمِكَ فَتَكُونَ مِنْ أَصْحَابِ النَّارِ﴾. لكن قابيل لم يسمع، فقتل أخاه — وكان ذلك أول جريمة قتل في التاريخ البشري.</p>
        <p>وقف قابيل لا يعرف ماذا يفعل بجسد أخيه، فبعث الله غراباً يبحث في الأرض ليريه كيف يواري سوءة أخيه. وندم قابيل ندماً شديداً، لكن الندم جاء بعد فوات الأوان.</p>

        <div class="lesson-box">

let currentCat = 'all';

function renderStories(list) {
  const grid = document.getElementById('storiesGrid');
  grid.innerHTML = list.map(s => `
    <div class="story-card" onclick="openStory(${s.id})">
      <div class="story-cover" style="background:${s.color};">
        <span style="font-size:3.5rem;position:relative;z-index:1;">${s.icon}</span>
      </div>
      <div class="story-body">
        <span class="story-cat cat-${s.cat}">${getCatName(s.cat)}</span>
        <h3>${s.title}</h3>
        <p>${s.summary}</p>
        <div class="story-footer">
          <span class="story-read"><i class="fas fa-book-open"></i> اقرأ القصة</span>
          <span class="story-time"><i class="fas fa-clock"></i> ${s.time}</span>
        </div>
      </div>
    </div>
  `).join('');
}

function getCatName(cat) {
  return {prophets:'قصص الأنبياء', seerah:'السيرة النبوية', companions:'الصحابة الكرام', tabiin:'التابعون'}[cat] || '';
}

function filterCat(cat, btn) {
  currentCat = cat;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const filtered = cat === 'all' ? STORIES : STORIES.filter(s => s.cat === cat);
  renderStories(filtered);
}

function openStory(id) {
  const story = STORIES.find(s => s.id === id);
  if (!story) return;
  document.getElementById('storiesListView').style.display = 'none';
  document.getElementById('storyReaderView').style.display = 'block';
  document.getElementById('storyContent').innerHTML = story.content;
  window.scrollTo(0, 0);
}

function backToStories() {
  document.getElementById('storyReaderView').style.display = 'none';
  document.getElementById('storiesListView').style.display = 'block';
  window.scrollTo(0, 0);
}

// init
renderStories(STORIES);

// scroll reveal
const observer = new IntersectionObserver(entries => {
  entries.forEach(e => { if(e.isIntersecting){ e.target.style.opacity='1'; e.target.style.transform='translateY(0)'; } });
}, {threshold:0.08});
document.querySelectorAll('.story-card').forEach(el => {
  el.style.opacity='0'; el.style.transform='translateY(20px)'; el.style.transition='opacity 0.5s ease,transform 0.5s ease';
  observer.observe(el);
});
</script>
