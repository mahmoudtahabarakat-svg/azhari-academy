.arch-tab{padding:7px 18px;border-radius:50px;border:2px solid var(--cream-dark);background:var(--cream);font-family:'Tajawal',sans-serif;font-size:0.82rem;font-weight:600;cursor:pointer;transition:all 0.3s;}

@media(max-width:600px){.nav-links{display:none;}.ayah-text{font-size:1.3rem;}.hadith-text{font-size:1.1rem;}}

  {ar:'فَإِنَّ مَعَ الْعُسْرِ يُسْرًا إِنَّ مَعَ الْعُسْرِ يُسْرًا', ref:'سورة الشرح: ٥-٦', en:'For indeed, with hardship will be ease. Indeed, with hardship will be ease.', fr:'Car en vérité, avec la difficulté vient la facilité. En vérité, avec la difficulté vient la facilité.'},
  {ar:'وَعَسَىٰ أَن تَكْرَهُوا شَيْئًا وَهُوَ خَيْرٌ لَّكُمْ', ref:'سورة البقرة: ٢١٦', en:'But perhaps you hate a thing and it is good for you.', fr:'Peut-être détestez-vous une chose alors qu\'elle vous est bonne.'},
  {ar:'اللَّهُ لَا إِلَٰهَ إِلَّا هُوَ الْحَيُّ الْقَيُّومُ', ref:'آية الكرسي — البقرة: ٢٥٥', en:'Allah! There is no deity except Him, the Ever-Living, the Sustainer of existence.', fr:'Allah! Il n\'y a de dieu que Lui, le Vivant, Celui qui subsiste par Lui-même.'},
  {ar:'قُلْ هُوَ اللَّهُ أَحَدٌ اللَّهُ الصَّمَدُ لَمْ يَلِدْ وَلَمْ يُولَدْ', ref:'سورة الإخلاص: ١-٣', en:'Say: He is Allah, the One. Allah, the Eternal Refuge. He neither begets nor is born.', fr:'Dis: Il est Allah, l\'Unique. Allah, le Seul à être imploré pour ce que nous désirons. Il n\'a pas engendré et n\'a pas été engendré.'},
  {ar:'رَبَّنَا آتِنَا فِي الدُّنْيَا حَسَنَةً وَفِي الْآخِرَةِ حَسَنَةً وَقِنَا عَذَابَ النَّارِ', ref:'سورة البقرة: ٢٠١', en:'Our Lord, give us in this world that which is good and in the Hereafter that which is good and protect us from the punishment of the Fire.', fr:'Notre Seigneur! Donne-nous le bien dans cette vie et le bien dans la vie future et protège-nous du châtiment du Feu.'},

  {ar:'وَلَا تَيْأَسُوا مِن رَّوْحِ اللَّهِ إِنَّهُ لَا يَيْأَسُ مِن رَّوْحِ اللَّهِ إِلَّا الْقَوْمُ الْكَافِرُونَ', ref:'سورة يوسف: ٨٧', en:'Do not despair of relief from Allah. Indeed, no one despairs of relief from Allah except the disbelieving people.', fr:'Ne désespérez pas de la miséricorde d\'Allah. Seuls les gens incrédules désespèrent de la miséricorde d\'Allah.'},
  {ar:'وَإِذَا سَأَلَكَ عِبَادِي عَنِّي فَإِنِّي قَرِيبٌ أُجِيبُ دَعْوَةَ الدَّاعِ إِذَا دَعَانِ', ref:'سورة البقرة: ١٨٦', en:'When My servants ask you about Me, I am near. I answer the prayer of the supplicant when he calls upon Me.', fr:'Quand Mes serviteurs t\'interrogent sur Moi, Je suis tout proche; Je réponds à l\'appel de celui qui Me prie.'},
  {ar:'حَسْبُنَا اللَّهُ وَنِعْمَ الْوَكِيلُ', ref:'سورة آل عمران: ١٧٣', en:'Allah is sufficient for us, and He is the best Disposer of affairs.', fr:'Allah nous suffit et Il est le meilleur des garants.'},
  {ar:'وَمَا تَوْفِيقِي إِلَّا بِاللَّهِ عَلَيْهِ تَوَكَّلْتُ وَإِلَيْهِ أُنِيبُ', ref:'سورة هود: ٨٨', en:'My success is not but through Allah. Upon Him I have relied, and to Him I return.', fr:'Mon succès ne dépend que d\'Allah. C\'est en Lui que je me confie et c\'est vers Lui que je me tourne.'},
  {ar:'يَا أَيُّهَا الَّذِينَ آمَنُوا اسْتَعِينُوا بِالصَّبْرِ وَالصَّلَاةِ إِنَّ اللَّهَ مَعَ الصَّابِرِينَ', ref:'سورة البقرة: ١٥٣', en:'O you who have believed, seek help through patience and prayer. Indeed, Allah is with the patient.', fr:'Ô vous qui croyez! Cherchez secours dans la patience et dans la prière. Allah est avec ceux qui endurent patiemment.'},
  {ar:'وَلَسَوْفَ يُعْطِيكَ رَبُّكَ فَتَرْضَىٰ', ref:'سورة الضحى: ٥', en:'And your Lord is going to give you, and you will be satisfied.', fr:'Et ton Seigneur te donnera, et tu seras satisfait.'},
];

// ─── STATE ───
let currentHadithIdx = 0;
let currentAyahIdx = 0;
let ayahsHistory = JSON.parse(localStorage.getItem('ayahs_history') || '[]');
let hadithsHistory = JSON.parse(localStorage.getItem('hadiths_history') || '[]');

// ─── INIT ───
window.onload = () => {
  setDate();
  loadDailyContent();
  renderArchive('ayahs');
};

function setDate() {
  const now = new Date();
  const days = ['الأحد','الاثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];
  const months = ['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
  document.getElementById('dateGreg').textContent = `${days[now.getDay()]} — ${now.getDate()} ${months[now.getMonth()]} ${now.getFullYear()}`;
  
  const hijri = toHijri(now.getFullYear(), now.getMonth()+1, now.getDate());
  const hijriMonths = ['محرم','صفر','ربيع الأول','ربيع الثاني','جمادى الأولى','جمادى الآخرة','رجب','شعبان','رمضان','شوال','ذو القعدة','ذو الحجة'];
  document.getElementById('dateHijri').textContent = `${hijri.day} ${hijriMonths[hijri.month-1]} ${hijri.year} هـ`;
}

function loadDailyContent() {
  // Use day of year as seed for consistent daily content
  const now = new Date();
  const dayOfYear = Math.floor((now - new Date(now.getFullYear(), 0, 0)) / 86400000);
  
  currentAyahIdx = dayOfYear % AYAHS_POOL.length;
  currentHadithIdx = dayOfYear % HADITHS.length;
  
  renderAyah(currentAyahIdx);
  renderHadith(currentHadithIdx);
  
  // Save to history
  saveToHistory();
}

function renderAyah(idx) {
  const a = AYAHS_POOL[idx];
  document.getElementById('ayahText').textContent = a.ar;
  document.getElementById('ayahRef').textContent = '📖 ' + a.ref;
  document.getElementById('ayahTransEn').textContent = a.en;
  document.getElementById('ayahTransFr').textContent = a.fr;
}

function renderHadith(idx) {
  const h = HADITHS[idx];
  document.getElementById('hadithText').textContent = h.text;
  document.getElementById('hadithSanad').textContent = h.sanad;
  document.getElementById('hadithExp').textContent = h.exp;
  document.getElementById('hadithTrans').textContent = `🇬🇧 ${h.en}\n\n🇫🇷 ${h.fr}`;
}

function loadRandomAyah() {
  currentAyahIdx = (currentAyahIdx + 1) % AYAHS_POOL.length;
  renderAyah(currentAyahIdx);
}

function loadNextHadith() {
  currentHadithIdx = (currentHadithIdx + 1) % HADITHS.length;
  renderHadith(currentHadithIdx);
}

function shareAyah() {
  const a = AYAHS_POOL[currentAyahIdx];
  const msg = `📖 *آية اليوم*\n\n${a.ar}\n\n*${a.ref}*\n\n🇬🇧 ${a.en}\n\n🕌 أكاديمية المعلم الأزهري`;
  window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
}

function shareHadith() {
  const h = HADITHS[currentHadithIdx];
  const msg = `🌙 *حديث اليوم*\n\n${h.text}\n\n📚 ${h.sanad}\n\n💡 ${h.exp}\n\n🕌 أكاديمية المعلم الأزهري`;
  window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
}

function copyAyah() {
  const a = AYAHS_POOL[currentAyahIdx];
  navigator.clipboard.writeText(`${a.ar}\n${a.ref}`).then(() => alert('تم النسخ! ✅'));
}

function copyHadith() {
  const h = HADITHS[currentHadithIdx];
  navigator.clipboard.writeText(`${h.text}\n${h.sanad}`).then(() => alert('تم النسخ! ✅'));
}

function saveToHistory() {
  const now = new Date();
  const dateStr = `${now.getDate()}/${now.getMonth()+1}/${now.getFullYear()}`;
  const a = AYAHS_POOL[currentAyahIdx];
  const h = HADITHS[currentHadithIdx];
  
  if (!ayahsHistory.find(x => x.date === dateStr)) {
    ayahsHistory.unshift({ date: dateStr, text: a.ar, ref: a.ref });
    if (ayahsHistory.length > 30) ayahsHistory.pop();
    localStorage.setItem('ayahs_history', JSON.stringify(ayahsHistory));
  }
  
  if (!hadithsHistory.find(x => x.date === dateStr)) {
    hadithsHistory.unshift({ date: dateStr, text: h.text, sanad: h.sanad });
    if (hadithsHistory.length > 30) hadithsHistory.pop();
    localStorage.setItem('hadiths_history', JSON.stringify(hadithsHistory));
  }
}

function showArchive(type, btn) {
  document.querySelectorAll('.arch-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderArchive(type);
}

function renderArchive(type) {
  const list = type === 'ayahs' ? ayahsHistory : hadithsHistory;
  const container = document.getElementById('archiveList');
  
  if (list.length === 0) {
    container.innerHTML = '<p style="text-align:center;color:var(--text-muted);padding:20px;">لا يوجد أرشيف بعد — تفضّل كل يوم لتراكم الأرشيف 😊</p>';
    return;
  }
  
  container.innerHTML = list.map(item => `
    <div class="archive-item">
      <div class="arc-date">📅 ${item.date}</div>
      <div class="arc-text">${item.text}</div>
      <div class="arc-ref">${item.ref || item.sanad || ''}</div>
    </div>
  `).join('');
}

function toHijri(year, month, day) {
  const jd = Math.floor((1461*(year+4800+Math.floor((month-14)/12)))/4)+Math.floor((367*(month-2-12*Math.floor((month-14)/12)))/12)-Math.floor((3*Math.floor((year+4900+Math.floor((month-14)/12))/100))/4)+day-32075;
  let l=jd-1948440+10632;const n=Math.floor((l-1)/10631);l=l-10631*n+354;
  const j=(Math.floor((10985-l)/5316))*(Math.floor((50*l)/17719))+(Math.floor(l/5670))*(Math.floor((43*l)/15238));
  l=l-(Math.floor((30-j)/15))*(Math.floor((17719*j)/50))-(Math.floor(j/16))*(Math.floor((15238*j)/43))+29;
  return{year:30*n+j-30,month:Math.floor((24*l)/709),day:l-Math.floor((709*Math.floor((24*l)/709))/24)};
}
</script>
