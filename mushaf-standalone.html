<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>المصحف الشريف | أكاديمية المعلم الأزهري</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@400;600;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root{--green:#1B5E3B;--green-dark:#0F3D26;--gold:#C9A84C;--gold-light:#E2C47A;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Tajawal',sans-serif;background:#0d1117;color:#fff;min-height:100vh;}

nav{position:fixed;top:0;width:100%;z-index:1000;background:rgba(15,61,38,0.98);height:62px;border-bottom:1px solid rgba(201,168,76,0.3);display:flex;align-items:center;justify-content:space-between;padding:0 3%;}
.nav-logo{font-family:'Amiri',serif;font-size:1.1rem;color:var(--gold);text-decoration:none;}
.nav-links{display:flex;gap:2px;list-style:none;}
.nav-links a{color:rgba(255,255,255,0.8);text-decoration:none;font-size:0.78rem;padding:5px 8px;border-radius:6px;transition:all 0.3s;}
.nav-links a:hover,.nav-links a.active{background:rgba(201,168,76,0.2);color:var(--gold);}
.nav-cta{background:var(--gold);color:var(--green-dark);padding:6px 14px;border-radius:50px;font-weight:700;font-size:0.78rem;text-decoration:none;}

.top-bar{position:fixed;top:62px;width:100%;z-index:999;background:rgba(10,40,20,0.98);border-bottom:1px solid rgba(201,168,76,0.2);padding:10px 3%;display:flex;align-items:center;justify-content:center;flex-wrap:wrap;gap:10px;}

.ed-toggle{display:flex;background:rgba(255,255,255,0.07);border-radius:50px;padding:3px;gap:2px;}
.ed-btn{padding:7px 16px;border-radius:50px;border:none;font-family:'Tajawal',sans-serif;font-size:0.82rem;font-weight:700;cursor:pointer;transition:all 0.3s;color:rgba(255,255,255,0.5);background:transparent;}
.ed-btn.active{background:var(--gold);color:var(--green-dark);}

.pg-nav{display:flex;align-items:center;gap:7px;}
.pg-btn{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.08);border:1px solid rgba(201,168,76,0.25);color:#fff;cursor:pointer;font-size:0.95rem;display:flex;align-items:center;justify-content:center;transition:all 0.3s;}
.pg-btn:hover{background:var(--gold);color:var(--green-dark);}
input.pg-in{width:54px;text-align:center;padding:7px 4px;border-radius:8px;border:1px solid rgba(201,168,76,0.35);background:rgba(255,255,255,0.08);color:#fff;font-family:'Tajawal',sans-serif;font-size:0.88rem;outline:none;}
.pg-tot{color:rgba(255,255,255,0.5);font-size:0.8rem;}

select.ctrl{padding:8px 12px;border-radius:50px;border:1px solid rgba(201,168,76,0.3);font-family:'Tajawal',sans-serif;font-size:0.8rem;background:rgba(255,255,255,0.07);color:#fff;cursor:pointer;outline:none;}
select.ctrl option{background:#0a2814;}

.zoom-row{display:flex;align-items:center;gap:6px;}
.zm-btn{width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:#fff;cursor:pointer;font-size:0.88rem;display:flex;align-items:center;justify-content:center;transition:all 0.3s;font-weight:700;}
.zm-btn:hover{background:var(--gold);color:var(--green-dark);}
.zm-lbl{font-size:0.75rem;color:rgba(255,255,255,0.5);min-width:36px;text-align:center;}

.aud-row{display:flex;gap:5px;align-items:center;}
.aud-btn{width:34px;height:34px;border-radius:50%;background:var(--gold);color:var(--green-dark);border:none;cursor:pointer;font-size:0.85rem;display:flex;align-items:center;justify-content:center;transition:all 0.3s;}
.aud-btn:hover{transform:scale(1.1);}
.aud-btn.stop{background:rgba(255,255,255,0.1);color:#fff;}
.aud-btn.on{animation:ap 0.8s infinite;}
@keyframes ap{0%,100%{transform:scale(1);}50%{transform:scale(1.12);}}

/* MUSHAF DISPLAY */
.mushaf-wrap{margin-top:120px;display:flex;flex-direction:column;align-items:center;padding:16px;min-height:calc(100vh - 120px);}

.mushaf-page{
  background:#fff;
  border-radius:8px;
  box-shadow:0 20px 60px rgba(0,0,0,0.8);
  overflow:hidden;
  width:min(580px,95vw);
  transition:transform 0.3s;
  position:relative;
}

/* Page image display */
.page-img-wrap{width:100%;position:relative;min-height:400px;display:flex;align-items:center;justify-content:center;background:#faf8f0;}
#pageImg{width:100%;height:auto;display:block;transition:opacity 0.3s;}
#pageImg.dim{opacity:0.2;}

.page-spinner{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;background:rgba(250,248,240,0.9);}
.page-spinner i{font-size:2rem;color:var(--green);animation:spin 1s linear infinite;}
.page-spinner p{color:var(--green);font-size:0.88rem;font-family:'Tajawal',sans-serif;}
@keyframes spin{to{transform:rotate(360deg);}}

.info-bar{display:flex;gap:14px;align-items:center;margin-top:12px;background:rgba(255,255,255,0.05);border-radius:50px;padding:8px 20px;flex-wrap:wrap;justify-content:center;}
.info-bar span{font-size:0.8rem;color:rgba(255,255,255,0.6);}
.info-bar strong{color:var(--gold);}
.swipe-tip{color:rgba(255,255,255,0.2);font-size:0.72rem;margin-top:8px;}

.wa-float{position:fixed;bottom:22px;left:22px;z-index:999;width:50px;height:50px;border-radius:50%;background:#25D366;color:#fff;display:flex;align-items:center;justify-content:center;font-size:1.4rem;text-decoration:none;box-shadow:0 6px 20px rgba(37,211,102,0.4);}

@media(max-width:600px){.nav-links{display:none;}.top-bar{gap:6px;padding:8px 2%;}}
</style>

<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-CCJECHG2DF"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-CCJECHG2DF');
</script>
</head>
<body>

<nav>
  <a href="index-standalone.html" class="nav-logo">📖 أكاديمية المعلم الأزهري</a>
  <ul class="nav-links">
    <li><a href="index-standalone.html">الرئيسية</a></li>
    <li><a href="mushaf-standalone.html" class="active">المصحف</a></li>
    <li><a href="stories-standalone.html">القصص</a></li>
    <li><a href="kids-standalone.html">الأطفال</a></li>
    <li><a href="quiz-standalone.html">مسابقات</a></li>
    <li><a href="lessons-standalone.html">الدروس</a></li>
  </ul>
  <a href="index-standalone.html#inquiry" class="nav-cta">حصة مجانية 🎁</a>
</nav>

<div class="top-bar">
  <div class="ed-toggle">
    <button class="ed-btn active" onclick="setEd('hafs',this)">🇸🇦 حفص — السعودي</button>
    <button class="ed-btn" onclick="setEd('warsh',this)">🇪🇬 ورش — المصري</button>
  </div>

  <select class="ctrl" id="surahSel" onchange="jumpSurah()">
    <option value="">— اختر سورة —</option>
  </select>

  <div class="pg-nav">
    <button class="pg-btn" onclick="go(1)"><i class="fas fa-chevron-right"></i></button>
    <input type="number" class="pg-in" id="pgIn" min="1" max="604" value="1" onchange="goPage()">
    <span class="pg-tot">/ 604</span>
    <button class="pg-btn" onclick="go(-1)"><i class="fas fa-chevron-left"></i></button>
  </div>

  <div class="zoom-row">
    <button class="zm-btn" onclick="zoom(-10)">−</button>
    <span class="zm-lbl" id="zmLbl">100%</span>
    <button class="zm-btn" onclick="zoom(10)">+</button>
  </div>

  <select class="ctrl" id="recSel" onchange="changeRec()">
    <option value="ar.alafasy">مشاري العفاسي</option>
    <option value="ar.husary">الحصري</option>
    <option value="ar.minshawi">المنشاوي</option>
    <option value="ar.abdulbasitmurattal">عبد الباسط</option>
    <option value="ar.mahermuaiqly">المعيقلي</option>
    <option value="ar.abdullahbasfar">القطامي</option>
    <option value="ar.warsh">ورش عن نافع</option>
  </select>

  <!-- زر الشيخ البنا -->
  <a href="https://www.mp3quran.net/bna" target="_blank" 
     style="display:inline-flex;align-items:center;gap:7px;padding:7px 16px;background:rgba(201,168,76,0.15);border:1px solid rgba(201,168,76,0.4);border-radius:50px;color:var(--gold);text-decoration:none;font-family:'Tajawal',sans-serif;font-size:0.8rem;font-weight:700;transition:all 0.3s;"
     onmouseover="this.style.background='rgba(201,168,76,0.3)'" 
     onmouseout="this.style.background='rgba(201,168,76,0.15)'">
    🎙️ الشيخ البنا
  </a>

  <div class="aud-row">
    <button class="aud-btn" id="playBtn" onclick="toggleAudio()"><i class="fas fa-play" id="playIco"></i></button>
    <button class="aud-btn stop" onclick="stopAudio()"><i class="fas fa-stop"></i></button>
  </div>
</div>

<div class="mushaf-wrap">
  <div class="mushaf-page" id="mushafPage">
    <div class="page-img-wrap" id="imgWrap">
      <img id="pageImg" src="" alt="صفحة المصحف" onload="onLoad()" onerror="onErr()">
      <div class="page-spinner" id="spinner">
        <i class="fas fa-spinner"></i>
        <p>جاري تحميل الصفحة...</p>
      </div>
    </div>
  </div>

  <div class="info-bar">
    <span>الصفحة <strong id="pgNum">1</strong></span>
    <span>•</span>
    <span id="surahLbl">سورة الفاتحة</span>
    <span>•</span>
    <span id="juzLbl">الجزء الأول</span>
    <span>•</span>
    <span id="edLbl" style="color:var(--gold);">حفص عن عاصم</span>
  </div>
  <div class="swipe-tip">← اسحب أو استخدم الأزرار للتنقل →</div>
</div>

<a href="https://wa.me/201002798497" class="wa-float"><i class="fab fa-whatsapp"></i></a>

<script>
let pg=1, ed='hafs', rec='ar.alafasy', zm=100, aud=null, playing=false, surahs=[];

// Surah start pages - Medina Mushaf (Hafs)
const SP_HAFS=[1,2,50,77,106,128,151,177,187,208,221,235,249,255,262,267,272,277,282,286,289,293,296,302,306,309,315,318,322,325,328,331,333,336,338,340,342,344,346,349,351,353,355,357,359,360,362,364,366,367,369,371,373,375,376,378,380,382,383,385,387,389,390,392,393,395,396,398,399,400,402,403,404,405,406,407,408,409,410,411,412,413,414,415,416,417,417,418,419,419,420,421,421,422,422,423,423,423,424,424,425,425,425,426,426,426,427,427,427,428,428,428,429,429];

// Surah start pages - Egyptian Mushaf (Warsh) - slightly different
const SP_WARSH=[1,2,49,76,105,127,150,176,186,207,220,234,248,254,261,266,271,276,281,285,288,292,295,301,305,308,314,317,321,324,327,330,332,335,337,339,341,343,345,348,350,352,354,356,358,359,361,363,365,366,368,370,372,374,375,377,379,381,382,384,386,388,389,391,392,394,395,397,398,399,401,402,403,404,405,406,407,408,409,410,411,412,413,414,415,416,416,417,418,418,419,420,420,421,421,422,422,422,423,423,424,424,424,425,425,425,426,426,426,427,427,427,428,428];

const JP=[1,22,42,62,82,102,121,142,162,182,200,218,235,249,262,272,282,292,302,312,322,332,342,352,362,372,382,392,402,412];
const JN=['الأول','الثاني','الثالث','الرابع','الخامس','السادس','السابع','الثامن','التاسع','العاشر','الحادي عشر','الثاني عشر','الثالث عشر','الرابع عشر','الخامس عشر','السادس عشر','السابع عشر','الثامن عشر','التاسع عشر','العشرون','الحادي والعشرون','الثاني والعشرون','الثالث والعشرون','الرابع والعشرون','الخامس والعشرون','السادس والعشرون','السابع والعشرون','الثامن والعشرون','التاسع والعشرون','الثلاثون'];

// Image sources - multiple CDNs
const IMG_SOURCES = {
  hafs: p => [
    `https://www.quranflash.com/resources/img/hafs/${String(p).padStart(3,'0')}.png`,
    `https://qurancdn.com/images/Mushaf/${String(p).padStart(3,'0')}.jpg`,
    `https://archive.org/download/quran-images-hafs/${String(p).padStart(3,'0')}.jpg`,
  ],
  warsh: p => [
    `https://www.quranflash.com/resources/img/warsh/${String(p).padStart(3,'0')}.png`,
    `https://archive.org/download/quran-images-warsh/${String(p).padStart(3,'0')}.jpg`,
    `https://www.quranflash.com/resources/img/hafs/${String(p).padStart(3,'0')}.png`,
  ]
};

let srcIdx=0;

window.onload=()=>{
  fetch('https://api.alquran.cloud/v1/surah')
    .then(r=>r.json()).then(d=>{
      surahs=d.data;
      const SP=ed==='hafs'?SP_HAFS:SP_WARSH;
      document.getElementById('surahSel').innerHTML=
        '<option value="">— اختر سورة —</option>'+
        surahs.map((s,i)=>`<option value="${SP[i]||1}">${s.number}. ${s.name}</option>`).join('');
    }).catch(()=>{});
  loadPage(1);
  setupTouch();
};

function loadPage(p){
  p=Math.max(1,Math.min(604,p)); pg=p; srcIdx=0;
  const img=document.getElementById('pageImg');
  img.classList.add('dim');
  document.getElementById('spinner').style.display='flex';
  document.getElementById('pgIn').value=p;
  document.getElementById('pgNum').textContent=p;
  updateInfo(p);
  const urls=IMG_SOURCES[ed](p);
  img.src=urls[0];
}

function onLoad(){
  document.getElementById('pageImg').classList.remove('dim');
  document.getElementById('spinner').style.display='none';
  applyZoom();
}

function onErr(){
  const img=document.getElementById('pageImg');
  const urls=IMG_SOURCES[ed](pg);
  srcIdx++;
  if(srcIdx<urls.length){
    img.src=urls[srcIdx];
  } else {
    // All sources failed - show quranflash embed
    document.getElementById('spinner').style.display='none';
    showEmbed();
  }
}

function showEmbed(){
  const wrap=document.getElementById('imgWrap');
  const edition=ed==='hafs'?'hafs':'warsh';
  wrap.innerHTML=`
    <div style="width:100%;padding:30px;text-align:center;background:#faf8f0;">
      <p style="color:#1B5E3B;font-family:'Amiri',serif;font-size:1.2rem;margin-bottom:16px;">
        📖 اضغط لفتح الصفحة ${pg} في QuranFlash
      </p>
      <a href="https://www.quranflash.com/ar/${edition}/page/${pg}" target="_blank"
         style="background:#1B5E3B;color:#fff;padding:14px 28px;border-radius:50px;text-decoration:none;font-family:'Tajawal',sans-serif;font-weight:700;font-size:1rem;display:inline-block;margin:6px;">
        🌐 فتح المصحف — الصفحة ${pg}
      </a>
      <a href="https://quran.com/ar/${pg}" target="_blank"
         style="background:#C9A84C;color:#0F3D26;padding:14px 28px;border-radius:50px;text-decoration:none;font-family:'Tajawal',sans-serif;font-weight:700;font-size:1rem;display:inline-block;margin:6px;">
        📖 Quran.com
      </a>
      <div style="margin-top:20px;color:#666;font-size:0.82rem;font-family:'Tajawal',sans-serif;">
        ملاحظة: صور المصحف تحتاج اتصال إنترنت مباشر بالمصدر
      </div>
    </div>
  `;
}

function applyZoom(){
  document.getElementById('mushafPage').style.width=`min(${zm*5.8}px,95vw)`;
}

function updateInfo(p){
  const SP=ed==='hafs'?SP_HAFS:SP_WARSH;
  let si=0;
  for(let i=SP.length-1;i>=0;i--){if(p>=(SP[i]||1)){si=i;break;}}
  let ji=0;
  for(let i=JP.length-1;i>=0;i--){if(p>=JP[i]){ji=i;break;}}
  if(surahs[si]) document.getElementById('surahLbl').textContent=surahs[si].name;
  document.getElementById('juzLbl').textContent='الجزء '+JN[ji];
  document.getElementById('edLbl').textContent=ed==='hafs'?'حفص عن عاصم':'ورش عن نافع';
}

function go(d){
  stopAudio();
  // Restore img element if hidden
  const wrap=document.getElementById('imgWrap');
  wrap.innerHTML=`<img id="pageImg" src="" alt="صفحة المصحف" onload="onLoad()" onerror="onErr()"><div class="page-spinner" id="spinner"><i class="fas fa-spinner"></i><p>جاري تحميل الصفحة...</p></div>`;
  loadPage(pg-d);
}
function goPage(){const v=parseInt(document.getElementById('pgIn').value);if(v>=1&&v<=604)go(pg-v);}

function jumpSurah(){
  const v=parseInt(document.getElementById('surahSel').value);
  if(v){go(pg-v);}
}

function setEd(e,btn){
  ed=e;
  document.querySelectorAll('.ed-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  if(e==='warsh'){
    document.getElementById('recSel').value='ar.warsh';
    rec='ar.warsh';
  }
  // Update surah list
  if(surahs.length){
    const SP=e==='hafs'?SP_HAFS:SP_WARSH;
    document.getElementById('surahSel').innerHTML=
      '<option value="">— اختر سورة —</option>'+
      surahs.map((s,i)=>`<option value="${SP[i]||1}">${s.number}. ${s.name}</option>`).join('');
  }
  stopAudio();
  go(0);
}

function changeRec(){rec=document.getElementById('recSel').value;stopAudio();}

function zoom(d){
  zm=Math.max(50,Math.min(200,zm+d));
  document.getElementById('zmLbl').textContent=zm+'%';
  applyZoom();
}

async function toggleAudio(){
  if(playing){stopAudio();return;}
  try{
    const r=await fetch(`https://api.alquran.cloud/v1/page/${pg}/${rec}`);
    const d=await r.json();
    const ayahs=(d.data?.ayahs||[]).filter(a=>a.audio);
    if(ayahs.length){playSeq(ayahs,0);}else{playFallback();}
  }catch(e){playFallback();}
}

function playSeq(ayahs,i){
  if(i>=ayahs.length){stopAudio();return;}
  playing=true;
  document.getElementById('playIco').className='fas fa-pause';
  document.getElementById('playBtn').classList.add('on');
  aud=new Audio(ayahs[i].audio);
  aud.play();
  aud.onended=()=>playSeq(ayahs,i+1);
  aud.onerror=()=>playSeq(ayahs,i+1);
}

function playFallback(){
  const SP=ed==='hafs'?SP_HAFS:SP_WARSH;
  let si=0;
  for(let i=SP.length-1;i>=0;i--){if(pg>=(SP[i]||1)){si=i;break;}}
  const url=`https://cdn.islamic.network/quran/audio-surah/128/${rec}/${si+1}.mp3`;
  aud=new Audio(url);aud.play();
  playing=true;
  document.getElementById('playIco').className='fas fa-pause';
  document.getElementById('playBtn').classList.add('on');
  aud.onended=stopAudio;
}

function stopAudio(){
  if(aud){aud.pause();aud=null;}
  playing=false;
  document.getElementById('playIco').className='fas fa-play';
  document.getElementById('playBtn').classList.remove('on');
}

function setupTouch(){
  let sx=0;
  document.addEventListener('touchstart',e=>sx=e.touches[0].clientX,{passive:true});
  document.addEventListener('touchend',e=>{
    const d=sx-e.changedTouches[0].clientX;
    if(Math.abs(d)>60){if(d>0)go(-1);else go(1);}
  },{passive:true});
  document.addEventListener('keydown',e=>{
    if(e.key==='ArrowRight')go(1);
    if(e.key==='ArrowLeft')go(-1);
  });
}
</script>
</body>
</html>
