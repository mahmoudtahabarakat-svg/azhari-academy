<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>المصحف الشريف | أكاديمية المعلم الأزهري</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@400;600;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root{--green:#1B5E3B;--green-dark:#0F3D26;--gold:#C9A84C;--gold-light:#E2C47A;--cream:#FAF7F0;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Tajawal',sans-serif;background:#111;color:#fff;min-height:100vh;}

nav{position:fixed;top:0;width:100%;z-index:1000;background:rgba(15,61,38,0.97);height:62px;border-bottom:1px solid rgba(201,168,76,0.3);display:flex;align-items:center;justify-content:space-between;padding:0 3%;}
.nav-logo{font-family:'Amiri',serif;font-size:1.1rem;color:var(--gold);text-decoration:none;}
.nav-links{display:flex;gap:2px;list-style:none;}
.nav-links a{color:rgba(255,255,255,0.8);text-decoration:none;font-size:0.78rem;padding:5px 8px;border-radius:6px;transition:all 0.3s;}
.nav-links a:hover,.nav-links a.active{background:rgba(201,168,76,0.2);color:var(--gold);}
.nav-cta{background:var(--gold);color:var(--green-dark);padding:6px 14px;border-radius:50px;font-weight:700;font-size:0.78rem;text-decoration:none;}

.top-bar{position:fixed;top:62px;width:100%;z-index:999;background:rgba(10,40,20,0.97);border-bottom:1px solid rgba(201,168,76,0.2);padding:8px 2%;display:flex;align-items:center;justify-content:center;flex-wrap:wrap;gap:8px;}

.ed-toggle{display:flex;background:rgba(255,255,255,0.07);border-radius:50px;padding:3px;gap:2px;}
.ed-btn{padding:6px 14px;border-radius:50px;border:none;font-family:'Tajawal',sans-serif;font-size:0.8rem;font-weight:700;cursor:pointer;transition:all 0.3s;color:rgba(255,255,255,0.5);background:transparent;}
.ed-btn.active{background:var(--gold);color:var(--green-dark);}

select.ctrl{padding:7px 12px;border-radius:50px;border:1px solid rgba(201,168,76,0.3);font-family:'Tajawal',sans-serif;font-size:0.78rem;background:rgba(255,255,255,0.07);color:#fff;cursor:pointer;outline:none;}
select.ctrl option{background:#0a2814;}

.pg-nav{display:flex;align-items:center;gap:6px;}
.pg-btn{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,0.08);border:1px solid rgba(201,168,76,0.25);color:#fff;cursor:pointer;font-size:0.9rem;display:flex;align-items:center;justify-content:center;transition:all 0.3s;}
.pg-btn:hover{background:var(--gold);color:var(--green-dark);}
input.pg-input{width:52px;text-align:center;padding:6px 4px;border-radius:8px;border:1px solid rgba(201,168,76,0.35);background:rgba(255,255,255,0.08);color:#fff;font-family:'Tajawal',sans-serif;font-size:0.85rem;outline:none;}
.pg-total{color:rgba(255,255,255,0.5);font-size:0.78rem;}

.zoom-row{display:flex;align-items:center;gap:5px;}
.zm-btn{width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:#fff;cursor:pointer;font-size:0.82rem;display:flex;align-items:center;justify-content:center;transition:all 0.3s;font-weight:700;}
.zm-btn:hover{background:var(--gold);color:var(--green-dark);}
.zm-lbl{font-size:0.75rem;color:rgba(255,255,255,0.5);min-width:34px;text-align:center;}

.aud-row{display:flex;gap:5px;}
.aud-btn{width:32px;height:32px;border-radius:50%;background:var(--gold);color:var(--green-dark);border:none;cursor:pointer;font-size:0.82rem;display:flex;align-items:center;justify-content:center;transition:all 0.3s;}
.aud-btn:hover{transform:scale(1.1);}
.aud-btn.stop-btn{background:rgba(255,255,255,0.1);color:#fff;}
.aud-btn.playing{animation:ap 0.8s infinite;}
@keyframes ap{0%,100%{transform:scale(1);}50%{transform:scale(1.15);}}

.mushaf-wrap{margin-top:118px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:16px;min-height:calc(100vh - 118px);}

.page-box{position:relative;display:inline-flex;align-items:center;justify-content:center;}
#mushafImg{border-radius:6px;box-shadow:0 16px 60px rgba(0,0,0,0.85);max-width:min(580px,95vw);width:100%;transition:opacity 0.4s,width 0.3s;}
#mushafImg.dimmed{opacity:0.25;}

.spinner-overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;pointer-events:none;}
.spinner-overlay i{font-size:2.2rem;color:var(--gold);animation:spin 1s linear infinite;}
.spinner-overlay p{color:rgba(255,255,255,0.7);font-size:0.85rem;}
@keyframes spin{to{transform:rotate(360deg);}}

.info-bar{display:flex;gap:14px;align-items:center;margin-top:12px;background:rgba(255,255,255,0.05);border-radius:50px;padding:7px 18px;flex-wrap:wrap;justify-content:center;}
.info-bar span{font-size:0.78rem;color:rgba(255,255,255,0.6);}
.info-bar strong{color:var(--gold);}
.swipe-tip{color:rgba(255,255,255,0.2);font-size:0.72rem;margin-top:6px;text-align:center;}

.err-box{background:linear-gradient(135deg,var(--green-dark),var(--green));border-radius:12px;padding:50px 30px;text-align:center;max-width:460px;display:none;}
.err-box i{font-size:2.5rem;color:var(--gold);margin-bottom:12px;display:block;}
.err-box h3{font-family:'Amiri',serif;font-size:1.4rem;margin-bottom:8px;}
.err-box p{color:rgba(255,255,255,0.7);font-size:0.85rem;line-height:1.7;margin-bottom:16px;}
.retry-btn{background:var(--gold);color:var(--green-dark);border:none;padding:9px 22px;border-radius:50px;font-family:'Tajawal',sans-serif;font-weight:700;cursor:pointer;}

.wa-float{position:fixed;bottom:22px;left:22px;z-index:999;width:50px;height:50px;border-radius:50%;background:#25D366;color:#fff;display:flex;align-items:center;justify-content:center;font-size:1.4rem;text-decoration:none;box-shadow:0 6px 24px rgba(37,211,102,0.45);}

@media(max-width:600px){.nav-links{display:none;}.top-bar{gap:6px;}.ed-btn{padding:5px 10px;font-size:0.74rem;}}
</style>
</head>
<body>

<nav>
  <a href="index-standalone.html" class="nav-logo">📖 أكاديمية المعلم الأزهري</a>
  <ul class="nav-links">
    <li><a href="index-standalone.html">الرئيسية</a></li>
    <li><a href="mushaf-standalone.html" class="active">المصحف</a></li>
    <li><a href="stories-standalone.html">القصص</a></li>
    <li><a href="kids-standalone.html">الأطفال</a></li>
    <li><a href="quiz-standalone.html">مسابقات</a></li>
    <li><a href="lessons-standalone.html">الدروس</a></li>
  </ul>
  <a href="index-standalone.html#inquiry" class="nav-cta">حصة مجانية 🎁</a>
</nav>

<div class="top-bar">
  <div class="ed-toggle">
    <button class="ed-btn active" onclick="setEd('saudi',this)">🇸🇦 السعودي</button>
    <button class="ed-btn" onclick="setEd('egyptian',this)">🇪🇬 المصري</button>
  </div>

  <select class="ctrl" id="surahSel" onchange="jumpSurah()">
    <option value="">— سورة —</option>
  </select>

  <div class="pg-nav">
    <button class="pg-btn" onclick="go(1)" title="السابقة"><i class="fas fa-chevron-right"></i></button>
    <input type="number" class="pg-input" id="pgIn" min="1" max="604" value="1" onchange="goPage()">
    <span class="pg-total">/ 604</span>
    <button class="pg-btn" onclick="go(-1)" title="التالية"><i class="fas fa-chevron-left"></i></button>
  </div>

  <div class="zoom-row">
    <button class="zm-btn" onclick="zoom(-10)">−</button>
    <span class="zm-lbl" id="zmLbl">100%</span>
    <button class="zm-btn" onclick="zoom(10)">+</button>
  </div>

  <select class="ctrl" id="recSel" onchange="changeRec()">
    <option value="ar.alafasy">مشاري العفاسي</option>
    <option value="ar.husary">الحصري</option>
    <option value="ar.minshawi">المنشاوي</option>
    <option value="ar.abdulbasitmurattal">عبد الباسط</option>
    <option value="ar.mahermuaiqly">المعيقلي</option>
    <option value="ar.abdullahbasfar">القطامي</option>
    <option value="ar.warsh">ورش عن نافع</option>
  </select>

  <div class="aud-row">
    <button class="aud-btn" id="playBtn" onclick="toggleAudio()"><i class="fas fa-play" id="playIco"></i></button>
    <button class="aud-btn stop-btn" onclick="stopAudio()"><i class="fas fa-stop"></i></button>
  </div>
</div>

<div class="mushaf-wrap">
  <div class="page-box">
    <img id="mushafImg" src="" alt="صفحة القرآن" onload="onLoad()" onerror="onErr()">
    <div class="spinner-overlay" id="spinner">
      <i class="fas fa-spinner"></i>
      <p>جاري تحميل الصفحة...</p>
    </div>
  </div>
  <div class="err-box" id="errBox">
    <i class="fas fa-quran"></i>
    <h3>تعذّر تحميل الصفحة</h3>
    <p>تأكد من اتصالك بالإنترنت ثم حاول مجدداً</p>
    <button class="retry-btn" onclick="retry()">إعادة المحاولة</button>
  </div>
  <div class="info-bar" id="infoBar">
    <span>الصفحة <strong id="pgNum">1</strong></span>
    <span>•</span>
    <span id="surahName">سورة الفاتحة</span>
    <span>•</span>
    <span id="juzName">الجزء الأول</span>
  </div>
  <div class="swipe-tip">← اسحب يميناً أو يساراً للتنقل بين الصفحات →</div>
</div>

<a href="https://wa.me/201002798497" class="wa-float"><i class="fab fa-whatsapp"></i></a>

<script>
let pg=1, ed='saudi', rec='ar.alafasy', zm=100, audio=null, playing=false, surahs=[];

// Surah start pages (Medina Mushaf - hafs)
const SP=[1,2,50,77,106,128,151,177,187,208,221,235,249,255,262,267,272,277,282,286,289,293,296,302,306,309,315,318,322,325,328,331,333,336,338,340,342,344,346,349,351,353,355,357,359,360,362,364,366,367,369,371,373,375,376,378,380,382,383,385,387,389,390,392,393,395,396,398,399,400,402,403,404,405,406,407,408,409,410,411,412,413,414,415,416,417,417,418,419,419,420,421,421,422,422,423,423,423,424,424,425,425,425,426,426,426,427,427,427,428,428,428,429,429];
const JP=[1,22,42,62,82,102,121,142,162,182,200,218,235,249,262,272,282,292,302,312,322,332,342,352,362,372,382,392,402,412];
const AR_NUMS='٠١٢٣٤٥٦٧٨٩';
const toAr=n=>String(n).replace(/\d/g,d=>AR_NUMS[d]);
const JUZ_NAMES=['الأول','الثاني','الثالث','الرابع','الخامس','السادس','السابع','الثامن','التاسع','العاشر','الحادي عشر','الثاني عشر','الثالث عشر','الرابع عشر','الخامس عشر','السادس عشر','السابع عشر','الثامن عشر','التاسع عشر','العشرون','الحادي والعشرون','الثاني والعشرون','الثالث والعشرون','الرابع والعشرون','الخامس والعشرون','السادس والعشرون','السابع والعشرون','الثامن والعشرون','التاسع والعشرون','الثلاثون'];

window.onload=()=>{
  fetch('https://api.alquran.cloud/v1/surah')
    .then(r=>r.json()).then(d=>{
      surahs=d.data;
      const s=document.getElementById('surahSel');
      s.innerHTML='<option value="">— سورة —</option>'+
        surahs.map((x,i)=>`<option value="${SP[i]||1}">${x.number}. ${x.name}</option>`).join('');
    }).catch(()=>{});
  loadPage(1);
  setupTouch();
};

function getUrl(p){
  // Both editions use the same base images from reliable CDN
  // Saudi (Hafs): standard Medina mushaf
  // Egyptian (Warsh): same pages but different recitation
  return `https://cdn.islamic.network/quran/images/high-resolution/${p}.png`;
}

function loadPage(p){
  p=Math.max(1,Math.min(604,p)); pg=p;
  const img=document.getElementById('mushafImg');
  const sp=document.getElementById('spinner');
  const eb=document.getElementById('errBox');
  img.style.display='block'; eb.style.display='none';
  img.classList.add('dimmed'); sp.style.display='flex';
  window._triedSrc = 0;
  img.src=getUrl(p);
  document.getElementById('pgIn').value=p;
  document.getElementById('pgNum').textContent=p;
  updateInfo(p);
}

function onLoad(){
  const img=document.getElementById('mushafImg');
  img.classList.remove('dimmed');
  document.getElementById('spinner').style.display='none';
  img.style.maxWidth=`min(${zm*5.8}px,95vw)`;
}

function onErr(){
  const img=document.getElementById('mushafImg');
  // Try alternative CDN sources
  const sources=[
    `https://cdn.islamic.network/quran/images/${pg}.png`,
    `https://quran.com/images/quran_image/quran_mushaf/${pg}.png`,
    `https://islamweb.net/newlibrary/images/quran/${String(pg).padStart(3,'0')}.jpg`,
  ];
  // Find which source we're on
  let tried = window._triedSrc || 0;
  if(tried < sources.length){
    window._triedSrc = tried + 1;
    img.src = sources[tried];
    return;
  }
  window._triedSrc = 0;
  img.style.display='none';
  document.getElementById('spinner').style.display='none';
  document.getElementById('errBox').style.display='block';
}

function retry(){
  document.getElementById('errBox').style.display='none';
  loadPage(pg);
}

function updateInfo(p){
  let si=0;
  for(let i=SP.length-1;i>=0;i--){if(p>=(SP[i]||1)){si=i;break;}}
  let juz=0;
  for(let i=JP.length-1;i>=0;i--){if(p>=JP[i]){juz=i;break;}}
  document.getElementById('surahName').textContent=surahs[si]?.name||'';
  document.getElementById('juzName').textContent='الجزء '+JUZ_NAMES[juz];
}

function go(dir){loadPage(pg-dir);stopAudio();}
function goPage(){const v=parseInt(document.getElementById('pgIn').value);if(v>=1&&v<=604)loadPage(v);}
function jumpSurah(){const v=parseInt(document.getElementById('surahSel').value);if(v){loadPage(v);stopAudio();}}
function setEd(e,btn){ed=e;document.querySelectorAll('.ed-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');if(e==='egyptian'&&document.getElementById('recSel').value!=='ar.warsh'){document.getElementById('recSel').value='ar.warsh';rec='ar.warsh';}stopAudio();loadPage(pg);}
function changeRec(){rec=document.getElementById('recSel').value;stopAudio();}
function zoom(d){zm=Math.max(50,Math.min(200,zm+d));document.getElementById('zmLbl').textContent=zm+'%';const img=document.getElementById('mushafImg');img.style.maxWidth=`min(${zm*5.8}px,95vw)`;}

async function toggleAudio(){
  if(playing){stopAudio();return;}
  try{
    const r=await fetch(`https://api.alquran.cloud/v1/page/${pg}/${rec}`);
    const d=await r.json();
    const ayahs=(d.data?.ayahs||[]).filter(a=>a.audio);
    if(ayahs.length) playSeq(ayahs,0);
    else playFallback();
  }catch(e){playFallback();}
}

function playSeq(ayahs,i){
  if(i>=ayahs.length){stopAudio();return;}
  playing=true;
  document.getElementById('playIco').className='fas fa-pause';
  document.getElementById('playBtn').classList.add('playing');
  audio=new Audio(ayahs[i].audio);
  audio.play();
  audio.onended=()=>playSeq(ayahs,i+1);
  audio.onerror=()=>playSeq(ayahs,i+1);
}

function playFallback(){
  let si=0;
  for(let i=SP.length-1;i>=0;i--){if(pg>=(SP[i]||1)){si=i;break;}}
  const url=`https://cdn.islamic.network/quran/audio-surah/128/${rec}/${si+1}.mp3`;
  audio=new Audio(url);audio.play();
  playing=true;
  document.getElementById('playIco').className='fas fa-pause';
  document.getElementById('playBtn').classList.add('playing');
  audio.onended=stopAudio;
}

function stopAudio(){
  if(audio){audio.pause();audio=null;}
  playing=false;
  document.getElementById('playIco').className='fas fa-play';
  document.getElementById('playBtn').classList.remove('playing');
}

function setupTouch(){
  let sx=0;
  document.addEventListener('touchstart',e=>sx=e.touches[0].clientX,{passive:true});
  document.addEventListener('touchend',e=>{
    const d=sx-e.changedTouches[0].clientX;
    if(Math.abs(d)>60){if(d>0)go(-1);else go(1);}
  },{passive:true});
  document.addEventListener('keydown',e=>{
    if(e.key==='ArrowRight')go(1);
    if(e.key==='ArrowLeft')go(-1);
  });
}
</script>
</body>
</html>
